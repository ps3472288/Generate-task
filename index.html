<!DOCTYPE html>
<html>

<head>
    <title>Color Generator</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: red;
        }
        
        .box {
            width: 300px;
            height: 300px;
            background: white;
            text-align: center;
            box-shadow: 15px 15px 20px rgba(0, 0, 0, 0.5);
        }
        
        h1 {
            margin-top: 100px;
            font-size: 35px;
        }
        
        button {
            width: 150px;
            height: 40px;
            font-size: 18px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h1 id="colorCode">#000000</h1>

        <button onclick="generateColor()">
            Generate
        </button>
    </div>

    <script>
        function generateColor() {

            let letters = "0123456789ABCDEF";
            let color = "#";

            for (let i = 0; i < 6; i++) {
                color += letters[Math.floor(Math.random() * 16)];
            }

            document.body.style.background = color;
            document.getElementById("colorCode").innerHTML = color;
        }
    </script>

</body>

</html>
